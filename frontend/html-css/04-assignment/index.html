<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>04-Assignment | Sheryians Cohort-3 | Abdur Rahim</title>

    <link rel="stylesheet" href="styles.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/remixicon@4.9.1/fonts/remixicon.css"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Bakbak+One&family=Google+Sans+Flex:opsz,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet"
    />
  </head>
  <body>
    <main>
      <section class="grid-container">
        <!-- ===========side menu section=========== -->
        <div class="side-menu">
          <ul>
            <li>Clients</li>
            <li>Research</li>
            <li>Portfolio</li>
            <li>Podcast</li>
          </ul>
        </div>
        <!-- ==============hero card section============ -->
        <div class="hero-card">
          <div class="hero-top ">
            <span class="about-label"><i class="ri-command-fill"></i> About Me</span>
          </div>

          <div class="hero-card-container inverted-radius">
            <div class="hero-image">
              <div class="inner-circle"></div>
              <img src="./assets/hero-img.png" alt="" />
            </div>
            <div class="hero-bottom">
              <div class="hero-name">
                <p>Im,</p>
                <h2>
                  Jon <br />
                  Daniel
                </h2>
                <div class="email">
                  inquiry@jondaniel.design
                  <i class="ri-mail-open-line"></i>
                </div>
              </div>
              <div class="badge">
                <svg viewBox="0 0 100 100" width="90" height="90">
                  <!-- circular path for text -->
                  <defs>
                    <path
                      id="circlePath"
                      d="M 50,50 m -30,0 a 30,30 0 1,1 60,0 a 30,30 0 1,1 -60,0"
                    />
                  </defs>

                  <!-- circular text -->
                  <text
                    font-size="8"
                    fill="white"
                    letter-spacing="2"
                    text-anchor="middle"
                  >
                    <textPath href="#circlePath" startOffset="50%">
                      2022 • DESIGN PORTFOLIO •
                    </textPath>
                  </text>

                  <!-- center dot-->
                  <circle cx="50" cy="50" r="10" fill="#ffffff" />
                  <text
                    x="50"
                    y="54"
                    text-anchor="middle"
                    font-size="10"
                    fill="white"
                  ></text>
                </svg>
              </div>
            </div>
          </div>
        </div>
        <!-- ====================goose center section================= -->
        <div class="goose-center">
          <div class="play-btn">▶</div>
          <img src="./assets/gooose.jpg" alt="goose" class="goose-img" />
        </div>
        <!-- ========================portfolio title section================= -->
        <div class="portfolio-title">
          <h1 class="portfolio-text">
            Portfolio<i class="corner ri-arrow-up-s-line"></i>
          </h1>
        </div>
        <!-- ========================projects & awards section================= -->
        <div class="projects-awards">
          <div class="stat-card projects">
            <span class="stat-arrow"
              ><i class="tilt ri-arrow-up-s-line"></i
            ></span>
            <div class="stat-info">
              <h2 class="stat-number">251</h2>
              <p class="stat-label">Projects</p>
            </div>
          </div>
          <div class="stat-card awards">
            <span class="stat-arrow"
              ><i class="tilt ri-arrow-up-s-line"></i
            ></span>
            <div class="stat-info">
              <h2 class="stat-number">156</h2>
              <p class="stat-label">Awards</p>
            </div>
          </div>
        </div>
        <!-- ========================clients section================= -->
        <div class="clients">
          <div class="clients-inner">
            <span class="clients-arrow"
              ><i class="tilt ri-arrow-up-s-line"></i
            ></span>
            <div class="clients-logo">
              <i class="ri-apple-fill"></i>
            </div>
            <p class="clients-label">Clients</p>
          </div>
        </div>
        <!-- ========================global design section================= -->
        <div class="global-design">
          <div class="global-orb-card">
            <div class="global-orb">
              <img class="orb-img" src="./assets/globe-pink.png" alt="" />
            </div>
          </div>
          <div class="global-awards-card">
            <span class="awards-arrow"
              ><i class="tilt ri-arrow-up-s-line"></i
            ></span>
            <div class="global-text">
              <h2 class="global-number">172</h2>
              <p class="global-label">
                Global Design <br />
                Awards.
              </p>
            </div>
          </div>
        </div>
      </section>
    </main>
     <footer>
        <p>&copy; 2026 Portfolio. All rights reserved | Developed by <a href="https://www.linkedin.com/in/abdur4code">Abdur Rahim</a></p>
      </footer>
  </body>
</html>
